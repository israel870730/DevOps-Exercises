# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-nlb
  namespace: demo-1
  labels:
    app: example-nlb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: example-nlb
  template:
    metadata:
      labels:
        app: example-nlb
    spec:
      containers:
        - name: example-nlb
          image: nginx:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: example-nlb
  namespace: demo-1
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80
  selector:
    app: example-nlb
  type: LoadBalancer
