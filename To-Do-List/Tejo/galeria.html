<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería - Tour Challenger Tejo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a1a;
    font-family: 'Poppins', sans-serif;
    color: #fff;
    overflow-x: hidden;
  }

  /* ── NAVBAR ── */
  .navbar {
    width: 100%;
    padding: 16px 24px;
    display: flex;
    justify-content: center;
    gap: 8px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .nav-link {
    color: #fff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 10px;
    opacity: 0.4;
    transition: all 0.3s;
  }
  .nav-link:hover { opacity: 0.8; background: rgba(255,255,255,0.05); }
  .nav-link.active { opacity: 1; background: rgba(100,200,255,0.1); }

  /* ── PAGE HEADER ── */
  .page-header {
    text-align: center;
    padding: 50px 20px 30px;
  }
  .page-title {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    background: linear-gradient(135deg, #64c8ff, #c084fc, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .page-subtitle {
    font-size: 14px;
    opacity: 0.35;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* ── TOURNAMENT SECTION ── */
  .tournament-section {
    padding: 30px 20px 50px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .tournament-title {
    font-size: clamp(16px, 2.5vw, 22px);
    font-weight: 600;
    margin-bottom: 20px;
    padding-left: 16px;
    border-left: 3px solid #c084fc;
    opacity: 0.8;
  }

  /* ── CAROUSEL ── */
  .carousel-wrapper {
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    margin-bottom: 40px;
  }
  .carousel-track {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    padding: 8px 0;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .carousel-track::-webkit-scrollbar { display: none; }

  .carousel-slide {
    flex: 0 0 auto;
    width: clamp(260px, 40vw, 400px);
    aspect-ratio: 4/3;
    border-radius: 14px;
    overflow: hidden;
    scroll-snap-align: start;
    cursor: pointer;
    position: relative;
    background: rgba(255,255,255,0.05);
    transition: transform 0.3s;
  }
  .carousel-slide:hover { transform: scale(1.03); }
  .carousel-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s;
  }
  .carousel-slide img.error { opacity: 0.2; }

  .slide-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    opacity: 0.3;
  }

  .carousel-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    opacity: 0;
  }
  .carousel-wrapper:hover .carousel-btn { opacity: 1; }
  .carousel-btn:hover { background: rgba(100,200,255,0.3); }
  .carousel-btn.prev { left: 12px; }
  .carousel-btn.next { right: 12px; }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(20px);
    z-index: 500;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    animation: fadeIn 0.3s ease;
  }
  .lightbox.show { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.5);
  }
  .lightbox-close {
    position: absolute;
    top: 20px;
    right: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.2); }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  .lightbox-nav:hover { background: rgba(255,255,255,0.2); }
  .lightbox-nav.prev { left: 20px; }
  .lightbox-nav.next { right: 20px; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    opacity: 0.3;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

  /* ── CONFIG NOTE ── */
  .config-note {
    max-width: 700px;
    margin: 0 auto 40px;
    padding: 20px 24px;
    background: rgba(100,200,255,0.05);
    border: 1px solid rgba(100,200,255,0.15);
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.8;
    opacity: 0.6;
    text-align: center;
  }
  .config-note code {
    background: rgba(255,255,255,0.1);
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 12px;
  }

  /* ── CONTACT FOOTER ── */
  .contact-footer {
    width: 100%;
    margin-top: 40px;
    padding: 40px 20px;
    background: rgba(255,255,255,0.03);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .contact-footer.show { display: flex; }

  .contact-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 4px;
    opacity: 0.3;
    margin-bottom: 4px;
  }

  .contact-org {
    font-size: clamp(14px, 2vw, 17px);
    font-weight: 600;
    text-align: center;
    opacity: 0.8;
  }

  .contact-phones {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px 24px;
  }
  .contact-phone {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 14px;
    text-decoration: none;
    color: #fff;
    opacity: 0.7;
    transition: all 0.3s;
  }
  .contact-phone:hover { opacity: 1; background: rgba(100,200,255,0.1); border-color: rgba(100,200,255,0.3); }
  .contact-phone .wa-icon { flex-shrink: 0; }
  .contact-phone .phone-name { font-weight: 600; }

  .contact-email {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    opacity: 0.5;
    margin-top: 4px;
  }
  .contact-email a {
    color: #64c8ff;
    text-decoration: none;
    transition: opacity 0.3s;
  }
  .contact-email a:hover { opacity: 0.7; }

  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.15;
    pointer-events: none;
    z-index: -1;
  }
  .bg-orb.a { width: 500px; height: 500px; background: #6366f1; top: -100px; left: -100px; animation: floatA 12s ease-in-out infinite; }
  .bg-orb.b { width: 400px; height: 400px; background: #f472b6; bottom: -100px; right: -100px; animation: floatB 15s ease-in-out infinite; }
  @keyframes floatA { 0%,100% { transform: translate(0,0); } 50% { transform: translate(80px,60px); } }
  @keyframes floatB { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-60px,-80px); } }
</style>
</head>
<body>

<div class="bg-orb a"></div>
<div class="bg-orb b"></div>

<nav class="navbar">
  <a href="index.html" class="nav-link">Inicio</a>
  <a href="nosotros.html" class="nav-link">Nosotros</a>
  <a href="ranking.html" class="nav-link">Ranking</a>
  <a href="galeria.html" class="nav-link active">Galería</a>
</nav>

<div class="page-header">
  <div class="page-title">Galería de Torneos</div>
  <div class="page-subtitle">Los mejores momentos del Tour Challenger Tejo</div>
</div>
<!--
<div class="config-note">
  Para agregar fotos, creá carpetas dentro de <code>fotos/</code> con el nombre de cada torneo.<br>
  Ejemplo: <code>fotos/torneo-montevideo-2025/foto1.jpg</code><br>
  Luego editá la configuración en el script de abajo.
</div>
-->
<div id="gallery"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav prev" onclick="navLightbox(-1)">‹</button>
  <img id="lightboxImg" src="">
  <button class="lightbox-nav next" onclick="navLightbox(1)">›</button>
</div>

<!-- Contacto footer -->
<div class="contact-footer" id="contactFooter">
  <div class="contact-title">Contacto & Organización</div>
  <div class="contact-org" id="contactOrgDisplay"></div>
  <div class="contact-phones" id="contactPhonesDisplay"></div>
  <div class="contact-email" id="contactEmailDisplay"></div>
</div>

<script>
  // ══════════════════════════════════════════════
  // CONFIGURACIÓN DE TORNEOS - EDITÁ ESTO
  // ══════════════════════════════════════════════
  const torneos = [
    {
      nombre: "Salinas, Canelones 2026",
      carpeta: "fotos/2026/salinas/",
      fotos: ["foto1.jpg", "foto2.jpg", "foto3.jpg", "foto4.jpg", "foto5.jpg"]
    },
    {
      nombre: "Ciudad de Libertad, San Jose",
      carpeta: "fotos/2026/libertad/",
      fotos: ["foto1.jpg", "foto2.jpg", "foto3.jpg", "foto4.jpg"]
    }
    // Agregá más torneos copiando el bloque de arriba
  ];
  // ══════════════════════════════════════════════

  let lbImages = [];
  let lbIndex = 0;

  function buildGallery() {
    const container = document.getElementById('gallery');

    if (!torneos.length) {
      container.innerHTML = '<div class="empty-state"><div class="icon">📷</div><p>Aún no hay fotos</p></div>';
      return;
    }

    torneos.forEach((torneo, ti) => {
      const section = document.createElement('div');
      section.className = 'tournament-section';

      const title = document.createElement('div');
      title.className = 'tournament-title';
      title.textContent = torneo.nombre;
      section.appendChild(title);

      const wrapper = document.createElement('div');
      wrapper.className = 'carousel-wrapper';

      const track = document.createElement('div');
      track.className = 'carousel-track';
      track.id = `track-${ti}`;

      torneo.fotos.forEach((foto, fi) => {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        const img = document.createElement('img');
        img.src = torneo.carpeta + foto;
        img.alt = `${torneo.nombre} - Foto ${fi + 1}`;
        img.loading = 'lazy';
        img.onerror = () => { img.classList.add('error'); };
        slide.onclick = () => openLightbox(ti, fi);
        slide.appendChild(img);
        track.appendChild(slide);
      });

      wrapper.appendChild(track);

      const prevBtn = document.createElement('button');
      prevBtn.className = 'carousel-btn prev';
      prevBtn.innerHTML = '‹';
      prevBtn.onclick = () => scrollCarousel(ti, -1);
      wrapper.appendChild(prevBtn);

      const nextBtn = document.createElement('button');
      nextBtn.className = 'carousel-btn next';
      nextBtn.innerHTML = '›';
      nextBtn.onclick = () => scrollCarousel(ti, 1);
      wrapper.appendChild(nextBtn);

      section.appendChild(wrapper);
      container.appendChild(section);
    });
  }

  function scrollCarousel(ti, dir) {
    const track = document.getElementById(`track-${ti}`);
    const slideW = track.querySelector('.carousel-slide').offsetWidth + 16;
    track.scrollBy({ left: dir * slideW * 2, behavior: 'smooth' });
  }

  function openLightbox(ti, fi) {
    lbImages = torneos[ti].fotos.map(f => torneos[ti].carpeta + f);
    lbIndex = fi;
    showLightboxImage();
    document.getElementById('lightbox').classList.add('show');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('show');
  }

  function navLightbox(dir) {
    event.stopPropagation();
    lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
    showLightboxImage();
  }

  function showLightboxImage() {
    document.getElementById('lightboxImg').src = lbImages[lbIndex];
  }

  // Close lightbox on background click
  document.getElementById('lightbox').onclick = (e) => {
    if (e.target === e.currentTarget) closeLightbox();
  };

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (!document.getElementById('lightbox').classList.contains('show')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length; showLightboxImage(); }
    if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % lbImages.length; showLightboxImage(); }
  });

  buildGallery();

  // ── CONTACT (lee config del index.html) ──
  function renderContact() {
    let config = {
      contactOrg: 'Amigos del Tejo',
      contactPhones: 'Sandra - 095221275\nJuan - 095503914\nChristian - 095194244\nJose - 099793727',
      contactEmail: 'josebentancur1@hotmail.com'
    };
    try {
      const saved = localStorage.getItem('countdown_config');
      if (saved) { const s = JSON.parse(saved); config = { ...config, ...s }; }
    } catch(e) {}

    const footer = document.getElementById('contactFooter');
    const hasContent = config.contactOrg || config.contactPhones || config.contactEmail;
    footer.classList.toggle('show', !!hasContent);

    document.getElementById('contactOrgDisplay').textContent = config.contactOrg || '';

    const phonesEl = document.getElementById('contactPhonesDisplay');
    phonesEl.innerHTML = '';
    if (config.contactPhones) {
      config.contactPhones.split('\n').filter(l => l.trim()).forEach(line => {
        const parts = line.split('-').map(s => s.trim());
        const name = parts[0] || '';
        const phone = parts[1] || '';
        const cleanPhone = '598' + phone.replace(/\s/g,'').replace(/^0/,'');
        const a = document.createElement('a');
        a.className = 'contact-phone';
        a.href = phone ? `https://wa.me/${cleanPhone}` : '#';
        a.target = '_blank';
        a.innerHTML = `<svg class="wa-icon" viewBox="0 0 32 32" width="20" height="20"><path fill="#25D366" d="M16.01 2.93C8.84 2.93 3.02 8.74 3.02 15.9c0 2.29.6 4.52 1.74 6.49L3 29.07l6.87-1.8a12.93 12.93 0 006.14 1.56h.01c7.16 0 12.98-5.81 12.98-12.97 0-3.47-1.35-6.72-3.8-9.17a12.9 12.9 0 00-9.19-3.76zm0 23.7a10.72 10.72 0 01-5.48-1.5l-.39-.23-4.08 1.07 1.09-3.97-.26-.41a10.7 10.7 0 01-1.64-5.69c0-5.94 4.84-10.77 10.78-10.77 2.88 0 5.58 1.12 7.61 3.15a10.7 10.7 0 013.15 7.63c0 5.94-4.84 10.77-10.78 10.77v-.05zm5.91-8.07c-.32-.16-1.91-.94-2.21-1.05-.29-.11-.51-.16-.72.16-.21.32-.82 1.05-1.01 1.26-.18.21-.37.24-.69.08-.32-.16-1.36-.5-2.58-1.6-.96-.85-1.6-1.9-1.79-2.22-.18-.32-.02-.5.14-.66.15-.14.32-.37.49-.56.16-.18.21-.32.32-.53.11-.21.05-.4-.03-.56-.08-.16-.72-1.74-.99-2.38-.26-.63-.53-.54-.72-.55h-.62c-.21 0-.56.08-.85.4-.29.32-1.12 1.1-1.12 2.67 0 1.58 1.15 3.1 1.31 3.31.16.21 2.26 3.45 5.47 4.84.76.33 1.36.53 1.83.67.77.24 1.47.21 2.02.13.62-.09 1.91-.78 2.18-1.54.27-.75.27-1.4.19-1.54-.08-.13-.29-.21-.62-.37z"/></svg><span class="phone-name">${name}</span>${phone ? ' — ' + phone : ''}`;
        phonesEl.appendChild(a);
      });
    }

    const emailEl = document.getElementById('contactEmailDisplay');
    emailEl.innerHTML = '';
    if (config.contactEmail) {
      emailEl.innerHTML = `✉️ <a href="mailto:${config.contactEmail}">${config.contactEmail}</a>`;
    }
  }

  renderContact();
</script>
</body>
</html>
