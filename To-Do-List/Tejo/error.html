<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada - Tour Challenger Tejo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; background: #0a0a1a; font-family: 'Poppins', sans-serif;
    color: #fff; display: flex; flex-direction: column; align-items: center;
  }
  .navbar { width: 100%; padding: 16px 24px; display: flex; justify-content: center; gap: 8px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); }
  .nav-link { color: #fff; text-decoration: none; font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 8px 20px; border-radius: 10px; opacity: 0.4; transition: all 0.3s; }
  .nav-link:hover { opacity: 0.8; background: rgba(255,255,255,0.05); }

  .error-container {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 40px 20px; text-align: center; gap: 16px;
  }
  .error-code {
    font-size: clamp(80px, 20vw, 180px); font-weight: 800; line-height: 1;
    background: linear-gradient(135deg, #64c8ff, #c084fc, #f472b6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    opacity: 0.3;
  }
  .error-emoji { font-size: 60px; margin-bottom: -10px; }
  .error-title { font-size: clamp(20px, 4vw, 32px); font-weight: 800; opacity: 0.8; }
  .error-msg { font-size: 15px; opacity: 0.4; max-width: 400px; line-height: 1.6; }
  .error-btn {
    margin-top: 16px; padding: 14px 36px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
    font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.3s; text-decoration: none; display: inline-block;
  }
  .error-btn:hover { opacity: 0.85; transform: translateY(-2px); }

  .bg-orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.15; pointer-events: none; z-index: -1; }
  .bg-orb.a { width: 500px; height: 500px; background: #6366f1; top: -100px; left: -100px; animation: floatA 12s ease-in-out infinite; }
  .bg-orb.b { width: 400px; height: 400px; background: #f472b6; bottom: -100px; right: -100px; animation: floatB 15s ease-in-out infinite; }
  @keyframes floatA { 0%,100% { transform: translate(0,0); } 50% { transform: translate(80px,60px); } }
  @keyframes floatB { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-60px,-80px); } }
</style>
</head>
<body>
<div class="bg-orb a"></div>
<div class="bg-orb b"></div>

<nav class="navbar">
  <a href="index.html" class="nav-link">Inicio</a>
  <a href="nosotros.html" class="nav-link">Nosotros</a>
  <a href="ranking.html" class="nav-link">Ranking</a>
  <a href="galeria.html" class="nav-link">Galería</a>
</nav>

<div class="error-container">
  <div class="error-code">404</div>
  <div class="error-emoji">🏆</div>
  <div class="error-title">¡Ups! Esta página no existe</div>
  <div class="error-msg">Parece que el tejo se fue fuera de la cancha. La página que buscás no fue encontrada.</div>
  <a href="index.html" class="error-btn">Volver al inicio</a>
</div>
</body>
</html>
